<!DOCTYPE html>
<html>
  <head>
    <title>My Site</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #0f0f0f;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
      }
      .card {
        background-color: #1a1a2e;
        padding: 40px 60px;
        border-radius: 12px;
        text-align: center;
        border: 1px solid #00ff99;
      }
      h1 {
        color: #00ff99;
        font-size: 2.5rem;
        margin-bottom: 10px;
      }
      p {
        color: white;
        font-size: 1rem;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Learing github actions</h1>
      <p>Nginx + Docker + GitHub Actions</p>
    </div>
  </body>
</html>
